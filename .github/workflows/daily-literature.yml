name: Daily literature intelligence

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-literature
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check whether the primary Codex run already produced today
        id: daily_gate
        shell: bash
        run: |
          DAY=$(TZ=Asia/Shanghai date +%F)
          YEAR=$(TZ=Asia/Shanghai date +%Y)
          echo "day=$DAY" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "schedule" && -f "research-memory/literature/$YEAR/$DAY/daily-report.md" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Primary 09:00 Codex run already produced $DAY; fallback skipped."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Search, rank, download, and build report
        if: steps.daily_gate.outputs.skip != 'true'
        env:
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scripts/daily_literature_pipeline.py

      - name: Run invariant tests
        if: steps.daily_gate.outputs.skip != 'true'
        run: python -m unittest discover -s tests -v

      - name: Send optional briefing notification
        if: steps.daily_gate.outputs.skip != 'true'
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          BARK_URL: ${{ secrets.BARK_URL }}
        run: python scripts/send_daily_notification.py

      - name: Commit generated research memory
        if: steps.daily_gate.outputs.skip != 'true'
        shell: bash
        run: |
          git config user.name "research-intelligence-bot"
          git config user.email "research-intelligence-bot@users.noreply.github.com"
          git add research-memory/literature research-memory/ideas/idea-log.json web/data/research-bundle.json
          if git diff --cached --quiet; then
            echo "No new literature artifacts to commit."
          else
            git commit -m "docs: add literature report for ${{ steps.daily_gate.outputs.day }}"
            git push origin HEAD:main
          fi

      - name: Write run summary
        if: always()
        shell: bash
        run: |
          echo "## Daily literature intelligence" >> "$GITHUB_STEP_SUMMARY"
          echo "- Schedule: 09:15 Asia/Shanghai fallback after the 09:00 Codex run" >> "$GITHUB_STEP_SUMMARY"
          echo "- Fallback skipped: ${{ steps.daily_gate.outputs.skip }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Profile: flexible electronic skin front-end tactile computing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Report date: ${{ steps.daily_gate.outputs.day }}" >> "$GITHUB_STEP_SUMMARY"

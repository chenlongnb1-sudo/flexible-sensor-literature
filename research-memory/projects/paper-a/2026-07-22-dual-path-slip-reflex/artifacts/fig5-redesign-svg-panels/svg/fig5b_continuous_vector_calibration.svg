<svg xmlns="http://www.w3.org/2000/svg" width="117mm" height="44mm" viewBox="0 0 1170 440" role="img" aria-labelledby="title desc">
<title id="title">Fig. 5b: Continuous vector calibration</title>
<desc id="desc">Constant-total-load sweeps test whether raw Vx and Vy track signed pair imbalance; normalized eta variables remain offline analysis only.</desc>
<defs>
<style>
text { font-family: Arial, Helvetica, sans-serif; letter-spacing: 0; }
.panel-letter { font-size: 35.3px; font-weight: 700; fill: #222222; }
.panel-title { font-size: 30px; font-weight: 700; fill: #222222; }
.panel-title-compact { font-size: 27px; font-weight: 700; fill: #222222; }
.label { font-size: 28px; fill: #222222; }
.small { font-size: 27px; fill: #222222; }
.tiny { font-size: 26.5px; fill: #7A7A7A; }
.micro { font-size: 22px; fill: #7A7A7A; }
.micro-placeholder { font-size: 19px; fill: #7A7A7A; }
.clock-label { font-size: 20px; fill: #7A7A7A; }
.formula { font-size: 29px; font-weight: 700; }
.placeholder-tag { font-size: 27px; font-weight: 700; fill: #7A7A7A; }
.placeholder-name { font-size: 28px; font-weight: 700; fill: #222222; }
.placeholder-output { font-size: 26.5px; fill: #7A7A7A; }
</style>
<marker id="arrow-black" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#222222"/></marker>
<marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#0072B2"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#009E73"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#D55E00"/></marker>
<marker id="arrow-warning" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#E69F00"/></marker>
</defs>
<rect x="0" y="0" width="1170" height="440" fill="#FFFFFF" stroke="none" stroke-width="0"/>
<text x="12" y="38" class="panel-letter" text-anchor="start">
<tspan x="12" dy="0">b</tspan>
</text>
<text x="56" y="36" class="panel-title" text-anchor="start">
<tspan x="56" dy="0">Continuous vector calibration</tspan>
</text>
<line x1="94" y1="150" x2="170" y2="150" stroke="#D7DCE2" stroke-width="3"/>
<line x1="132" y1="112" x2="132" y2="188" stroke="#D7DCE2" stroke-width="3"/>
<polygon points="170,138.12 181.88,150 170,161.88 158.12,150" fill="#0072B2" stroke="#0072B2" stroke-width="3"/>
<polygon points="132,100.12 143.88,112 132,123.88 120.12,112" fill="#009E73" stroke="#009E73" stroke-width="3"/>
<polygon points="94,138.12 105.88,150 94,161.88 82.12,150" fill="#0072B2" stroke="#0072B2" stroke-width="3"/>
<polygon points="132,176.12 143.88,188 132,199.88 120.12,188" fill="#009E73" stroke="#009E73" stroke-width="3"/>
<line x1="40" y1="150" x2="78" y2="150" stroke="#0072B2" stroke-width="4" marker-end="url(#arrow-blue)"/>
<line x1="224" y1="150" x2="186" y2="150" stroke="#0072B2" stroke-width="4" marker-end="url(#arrow-blue)"/>
<text x="38" y="135" class="small" text-anchor="middle" style="fill:#0072B2;font-weight:700">
<tspan x="38" dy="0">F3</tspan>
</text>
<text x="226" y="135" class="small" text-anchor="middle" style="fill:#0072B2;font-weight:700">
<tspan x="226" dy="0">F1</tspan>
</text>
<line x1="316" y1="150" x2="392" y2="150" stroke="#D7DCE2" stroke-width="3"/>
<line x1="354" y1="112" x2="354" y2="188" stroke="#D7DCE2" stroke-width="3"/>
<polygon points="392,138.12 403.88,150 392,161.88 380.12,150" fill="#0072B2" stroke="#0072B2" stroke-width="3"/>
<polygon points="354,100.12 365.88,112 354,123.88 342.12,112" fill="#009E73" stroke="#009E73" stroke-width="3"/>
<polygon points="316,138.12 327.88,150 316,161.88 304.12,150" fill="#0072B2" stroke="#0072B2" stroke-width="3"/>
<polygon points="354,176.12 365.88,188 354,199.88 342.12,188" fill="#009E73" stroke="#009E73" stroke-width="3"/>
<line x1="354" y1="60" x2="354" y2="96" stroke="#009E73" stroke-width="4" marker-end="url(#arrow-green)"/>
<line x1="354" y1="240" x2="354" y2="204" stroke="#009E73" stroke-width="4" marker-end="url(#arrow-green)"/>
<text x="384" y="87" class="small" text-anchor="start" style="fill:#009E73;font-weight:700">
<tspan x="384" dy="0">F2</tspan>
</text>
<text x="384" y="218" class="small" text-anchor="start" style="fill:#009E73;font-weight:700">
<tspan x="384" dy="0">F4</tspan>
</text>
<text x="132" y="250" class="tiny" text-anchor="middle">
<tspan x="132" dy="0">F1 + F3 constant</tspan>
</text>
<text x="354" y="250" class="tiny" text-anchor="middle">
<tspan x="354" dy="0">F2 + F4 constant</tspan>
</text>
<text x="34" y="291" class="tiny" text-anchor="start" style="fill:#0072B2;font-weight:700">
<tspan x="34" dy="0">ρx = (F1 - F3)/(F1 + F3)</tspan>
</text>
<text x="34" y="325" class="tiny" text-anchor="start" style="fill:#009E73;font-weight:700">
<tspan x="34" dy="0">ρy = (F2 - F4)/(F2 + F4)</tspan>
</text>
<line x1="510" y1="282" x2="780" y2="282" stroke="#222222" stroke-width="3"/>
<line x1="510" y1="282" x2="510" y2="72" stroke="#222222" stroke-width="3"/>
<text x="645.0" y="310" class="small" text-anchor="middle">
<tspan x="645.0" dy="0">ρx</tspan>
</text>
<text x="487" y="177.0" class="small" text-anchor="middle" style="fill:#0072B2;font-weight:700" transform="rotate(-90 487 177.0)">
<tspan x="487" dy="0">raw Vx</tspan>
</text>
<text x="645.0" y="177.0" class="tiny" text-anchor="middle" style="fill:#7A7A7A;font-weight:700">
<tspan x="645.0" dy="0">[TO BE MEASURED]</tspan>
</text>
<line x1="855" y1="282" x2="1125" y2="282" stroke="#222222" stroke-width="3"/>
<line x1="855" y1="282" x2="855" y2="72" stroke="#222222" stroke-width="3"/>
<text x="990.0" y="310" class="small" text-anchor="middle">
<tspan x="990.0" dy="0">ρy</tspan>
</text>
<text x="832" y="177.0" class="small" text-anchor="middle" style="fill:#009E73;font-weight:700" transform="rotate(-90 832 177.0)">
<tspan x="832" dy="0">raw Vy</tspan>
</text>
<text x="990.0" y="177.0" class="tiny" text-anchor="middle" style="fill:#7A7A7A;font-weight:700">
<tspan x="990.0" dy="0">[TO BE MEASURED]</tspan>
</text>
<rect x="492" y="338" width="653" height="90" fill="#F5F5F5" stroke="#7A7A7A" stroke-width="3.5" stroke-dasharray="12 9"/>
<text x="508" y="372" class="placeholder-tag" text-anchor="start">
<tspan x="508" dy="0">[TO BE MEASURED]</tspan>
</text>
<text x="800" y="357" class="small" text-anchor="start" style="font-weight:700">
<tspan x="800" dy="0">Constant-total-load</tspan>
<tspan x="800" dy="1.0em">force-ratio scan</tspan>
</text>
<text x="1125" y="419" class="tiny" text-anchor="end" style="fill:#7A7A7A">
<tspan x="1125" dy="0">Vz constancy • orthogonal leakage • sweep direction</tspan>
</text>
<text x="238" y="381" class="tiny" text-anchor="middle" style="fill:#7A7A7A;font-style:italic">
<tspan x="238" dy="0">ηx = Vx/Vz and ηy = Vy/Vz</tspan>
<tspan x="238" dy="1.0em">offline analysis only</tspan>
</text>
</svg>
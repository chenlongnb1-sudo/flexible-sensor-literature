<svg xmlns="http://www.w3.org/2000/svg" width="57mm" height="76mm" viewBox="0 0 570 760" role="img" aria-labelledby="title desc">
<title id="title">Fig. 5c: Comparator event generation</title>
<desc id="desc">Calibrated raw Vz, Vx, and Vy feed hysteretic comparators that expose contact, overload, and signed direction event pins.</desc>
<defs>
<style>

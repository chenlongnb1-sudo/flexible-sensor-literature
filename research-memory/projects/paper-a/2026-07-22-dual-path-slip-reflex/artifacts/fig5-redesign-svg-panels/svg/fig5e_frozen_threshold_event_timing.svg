<svg xmlns="http://www.w3.org/2000/svg" width="56mm" height="36mm" viewBox="0 0 560 360" role="img" aria-labelledby="title desc">
<title id="title">Fig. 5e: Frozen-threshold event timing</title>
<desc id="desc">A common clock must align the external force reference, continuous vectors, and all six event pins on independent test sequences.</desc>
<defs>
<style>
text { font-family: Arial, Helvetica, sans-serif; letter-spacing: 0; }
.panel-letter { font-size: 35.3px; font-weight: 700; fill: #222222; }
.panel-title { font-size: 30px; font-weight: 700; fill: #222222; }
.panel-title-compact { font-size: 27px; font-weight: 700; fill: #222222; }
.label { font-size: 28px; fill: #222222; }
.small { font-size: 27px; fill: #222222; }
.tiny { font-size: 26.5px; fill: #7A7A7A; }
.micro { font-size: 22px; fill: #7A7A7A; }
.micro-placeholder { font-size: 19px; fill: #7A7A7A; }
.clock-label { font-size: 20px; fill: #7A7A7A; }
.formula { font-size: 29px; font-weight: 700; }
.placeholder-tag { font-size: 27px; font-weight: 700; fill: #7A7A7A; }
.placeholder-name { font-size: 28px; font-weight: 700; fill: #222222; }
.placeholder-output { font-size: 26.5px; fill: #7A7A7A; }
</style>
<marker id="arrow-black" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#222222"/></marker>
<marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#0072B2"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#009E73"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#D55E00"/></marker>
<marker id="arrow-warning" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#E69F00"/></marker>
</defs>
<rect x="0" y="0" width="560" height="360" fill="#FFFFFF" stroke="none" stroke-width="0"/>
<text x="12" y="38" class="panel-letter" text-anchor="start">
<tspan x="12" dy="0">e</tspan>
</text>
<text x="56" y="36" class="panel-title-compact" text-anchor="start">
<tspan x="56" dy="0">Frozen-threshold event timing</tspan>
</text>
<rect x="20" y="58" width="140" height="64" fill="#FFFFFF" stroke="#222222" stroke-width="3"/>
<text x="90.0" y="85" class="tiny" text-anchor="middle" style="fill:#222222;font-weight:700">
<tspan x="90.0" dy="0">Force</tspan>
</text>
<text x="90.0" y="109" class="tiny" text-anchor="middle">
<tspan x="90.0" dy="0">reference</tspan>
</text>
<line x1="160" y1="90" x2="201" y2="90" stroke="#7A7A7A" stroke-width="3" marker-end="url(#arrow-black)"/>
<rect x="210" y="58" width="140" height="64" fill="#FFFFFF" stroke="#D55E00" stroke-width="3"/>
<text x="280.0" y="85" class="tiny" text-anchor="middle" style="fill:#D55E00;font-weight:700">
<tspan x="280.0" dy="0">Vectors</tspan>
</text>
<text x="280.0" y="109" class="tiny" text-anchor="middle">
<tspan x="280.0" dy="0">Vz / Vx / Vy</tspan>
</text>
<line x1="350" y1="90" x2="391" y2="90" stroke="#7A7A7A" stroke-width="3" marker-end="url(#arrow-black)"/>
<rect x="400" y="58" width="140" height="64" fill="#FFFFFF" stroke="#0072B2" stroke-width="3"/>
<text x="470.0" y="85" class="tiny" text-anchor="middle" style="fill:#0072B2;font-weight:700">
<tspan x="470.0" dy="0">Six event</tspan>
</text>
<text x="470.0" y="109" class="tiny" text-anchor="middle">
<tspan x="470.0" dy="0">pins</tspan>
</text>
<line x1="38" y1="160" x2="522" y2="160" stroke="#7A7A7A" stroke-width="4"/>
<line x1="90" y1="122" x2="90" y2="160" stroke="#7A7A7A" stroke-width="3"/>
<line x1="280" y1="122" x2="280" y2="160" stroke="#7A7A7A" stroke-width="3"/>
<line x1="470" y1="122" x2="470" y2="160" stroke="#7A7A7A" stroke-width="3"/>
<rect x="100" y="130" width="170" height="27" fill="#FFFFFF" stroke="none" stroke-width="0"/>
<text x="185" y="152" class="clock-label" text-anchor="middle" style="fill:#7A7A7A;font-weight:700">
<tspan x="185" dy="0">COMMON CLOCK</tspan>
</text>
<rect x="18" y="170" width="524" height="146" fill="#F5F5F5" stroke="#7A7A7A" stroke-width="3.5" stroke-dasharray="12 9"/>
<line x1="180" y1="205" x2="525" y2="205" stroke="#222222" stroke-width="3" marker-end="url(#arrow-black)"/>
<text x="480" y="195" class="micro" text-anchor="end">
<tspan x="480" dy="0">time</tspan>
</text>
<text x="365" y="228" class="micro-placeholder" text-anchor="middle" style="fill:#7A7A7A;font-weight:700">
<tspan x="365" dy="0">[TO BE MEASURED]</tspan>
</text>
<text x="30" y="240" class="micro" text-anchor="start" style="fill:#222222">
<tspan x="30" dy="0">Force ref.</tspan>
</text>
<line x1="170" y1="235" x2="525" y2="235" stroke="#D7DCE2" stroke-width="3"/>
<text x="30" y="264" class="micro" text-anchor="start" style="fill:#222222">
<tspan x="30" dy="0">Vz / Vx / Vy</tspan>
</text>
<line x1="170" y1="259" x2="525" y2="259" stroke="#D7DCE2" stroke-width="3"/>
<text x="30" y="288" class="micro" text-anchor="start" style="fill:#0072B2">
<tspan x="30" dy="0">CONTACT / OVERLOAD</tspan>
</text>
<line x1="300" y1="283" x2="525" y2="283" stroke="#D7DCE2" stroke-width="3"/>
<text x="30" y="312" class="micro" text-anchor="start" style="fill:#0072B2">
<tspan x="30" dy="0">X± / Y±</tspan>
</text>
<line x1="170" y1="307" x2="525" y2="307" stroke="#D7DCE2" stroke-width="3"/>
<text x="280" y="345" class="micro" text-anchor="middle" style="fill:#7A7A7A">
<tspan x="280" dy="0">Thresholds frozen before independent test.</tspan>
</text>
</svg>
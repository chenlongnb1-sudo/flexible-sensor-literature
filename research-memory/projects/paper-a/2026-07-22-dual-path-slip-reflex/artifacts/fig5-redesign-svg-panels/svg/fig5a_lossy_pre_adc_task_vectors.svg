<svg xmlns="http://www.w3.org/2000/svg" width="54mm" height="44mm" viewBox="0 0 540 440" role="img" aria-labelledby="title desc">
<title id="title">Fig. 5a: Lossy pre-ADC task vectors</title>
<desc id="desc">Four diamond-arranged sensing units map to Vz, Vx, and Vy; the compact inset shows an irreversible degeneracy.</desc>
<defs>
<style>
text { font-family: Arial, Helvetica, sans-serif; letter-spacing: 0; }
.panel-letter { font-size: 35.3px; font-weight: 700; fill: #222222; }
.panel-title { font-size: 30px; font-weight: 700; fill: #222222; }
.panel-title-compact { font-size: 27px; font-weight: 700; fill: #222222; }
.label { font-size: 28px; fill: #222222; }
.small { font-size: 27px; fill: #222222; }
.tiny { font-size: 26.5px; fill: #7A7A7A; }
.micro { font-size: 22px; fill: #7A7A7A; }
.micro-placeholder { font-size: 19px; fill: #7A7A7A; }
.clock-label { font-size: 20px; fill: #7A7A7A; }
.formula { font-size: 29px; font-weight: 700; }
.placeholder-tag { font-size: 27px; font-weight: 700; fill: #7A7A7A; }
.placeholder-name { font-size: 28px; font-weight: 700; fill: #222222; }
.placeholder-output { font-size: 26.5px; fill: #7A7A7A; }
</style>
<marker id="arrow-black" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#222222"/></marker>
<marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#0072B2"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#009E73"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#D55E00"/></marker>
<marker id="arrow-warning" markerWidth="10" markerHeight="10" refX="8.5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3.5 L0,7 Z" fill="#E69F00"/></marker>
</defs>
<rect x="0" y="0" width="540" height="440" fill="#FFFFFF" stroke="none" stroke-width="0"/>
<text x="12" y="38" class="panel-letter" text-anchor="start">
<tspan x="12" dy="0">a</tspan>
</text>
<text x="56" y="36" class="panel-title" text-anchor="start">
<tspan x="56" dy="0">Lossy pre-ADC task vectors</tspan>
</text>
<line x1="44" y1="158" x2="140" y2="158" stroke="#D7DCE2" stroke-width="3"/>
<line x1="92" y1="110" x2="92" y2="206" stroke="#D7DCE2" stroke-width="3"/>
<polygon points="140,145.13 152.87,158 140,170.87 127.13,158" fill="#0072B2" stroke="#0072B2" stroke-width="3"/>
<text x="140" y="164" class="tiny" text-anchor="middle" style="fill:#222222;font-weight:700">
<tspan x="140" dy="0">R4/V1</tspan>
</text>
<polygon points="92,97.13 104.87,110 92,122.87 79.13,110" fill="#009E73" stroke="#009E73" stroke-width="3"/>
<text x="92" y="116" class="tiny" text-anchor="middle" style="fill:#222222;font-weight:700">
<tspan x="92" dy="0">R1/V2</tspan>
</text>
<polygon points="44,145.13 56.870000000000005,158 44,170.87 31.13,158" fill="#0072B2" stroke="#0072B2" stroke-width="3"/>
<text x="44" y="164" class="tiny" text-anchor="middle" style="fill:#222222;font-weight:700">
<tspan x="44" dy="0">R2/V3</tspan>
</text>
<polygon points="92,193.13 104.87,206 92,218.87 79.13,206" fill="#009E73" stroke="#009E73" stroke-width="3"/>
<text x="92" y="212" class="tiny" text-anchor="middle" style="fill:#222222;font-weight:700">
<tspan x="92" dy="0">R3/V4</tspan>
</text>
<line x1="154" y1="158" x2="182" y2="158" stroke="#D55E00" stroke-width="4" marker-end="url(#arrow-orange)"/>
<rect x="190" y="72" width="320" height="195" fill="#FFFFFF" stroke="#D55E00" stroke-width="4"/>
<text x="205" y="101" class="small" text-anchor="start" style="fill:#D55E00;font-weight:700">
<tspan x="205" dy="0">Pre-ADC projection</tspan>
</text>
<text x="213" y="137" class="formula" text-anchor="start" style="fill:#222222">
<tspan x="213" dy="0">Vz = V1 + V2 +</tspan>
<tspan x="213" dy="1.0em">V3 + V4</tspan>
</text>
<text x="213" y="213" class="formula" text-anchor="start" style="fill:#0072B2">
<tspan x="213" dy="0">Vx = V1 - V3</tspan>
</text>
<text x="213" y="251" class="formula" text-anchor="start" style="fill:#009E73">
<tspan x="213" dy="0">Vy = V2 - V4</tspan>
</text>
<rect x="24" y="282" width="496" height="140" fill="#FAFAFA" stroke="#D7DCE2" stroke-width="3"/>
<text x="38" y="311" class="small" text-anchor="start" style="font-weight:700">

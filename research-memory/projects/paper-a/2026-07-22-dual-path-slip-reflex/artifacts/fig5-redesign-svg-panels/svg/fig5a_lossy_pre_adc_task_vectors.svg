</text>
<line x1="263" y1="344" x2="326" y2="344" stroke="#D55E00" stroke-width="4" marker-end="url(#arrow-orange)"/>
<rect x="340" y="311" width="158" height="70" fill="#FCF0E8" stroke="#D55E00" stroke-width="3"/>
<text x="419" y="338" class="tiny" text-anchor="middle" style="fill:#D55E00;font-weight:700">
<tspan x="419" dy="0">same vector</tspan>
</text>
<text x="419" y="368" class="formula" text-anchor="middle" style="fill:#222222">
<tspan x="419" dy="0">[2, 0, 0]</tspan>
</text>
</svg>